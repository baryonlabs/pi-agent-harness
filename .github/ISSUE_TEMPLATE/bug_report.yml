name: Bug report
description: Report a defect in Harness (unexpected behavior, crash, broken install, etc.)
title: "[bug] "
labels: ["bug", "needs-triage"]
assignees:
  - revfactory
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.

        Before submitting, please skim open issues to avoid duplicates.

        **Triage SLA:** we aim to label new issues within 48h and respond substantively within 72h on business days (see [CONTRIBUTING.md](../../CONTRIBUTING.md)).

  - type: input
    id: pi-version
    attributes:
      label: pi version
      description: Output of `pi --version` (e.g. `1.4.2`)
      placeholder: "x.y.z"
    validations:
      required: true

  - type: dropdown
    id: subagent-extension
    attributes:
      label: subagent extension loaded?
      description: Is the bundled `subagent` extension active? (check `/reload` / installed packages, or that `subagent` appears as a tool)
      options:
        - "Yes, subagent tool is available"
        - "No, subagent tool is missing"
        - "I don't know / N/A"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce. Commands, config, and inputs please.
      placeholder: |
        1. `pi install git:github.com/baryonlabs/pi-agent-harness`
        2. inside pi: `하네스 구성해줘 ...` (or `build a harness for ...`)
        3. observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages / stack traces verbatim.
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - "macOS"
        - "Linux"
        - "Windows (WSL)"
        - "Windows (native)"
        - "Other (describe below)"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context (optional)
      description: Logs, screenshots, or anything else that might help. Redact anything sensitive.
    validations:
      required: false
